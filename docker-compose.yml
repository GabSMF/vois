version: '3.8'

services:
  vois-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    environment:
      - DEBUG=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Example of how to add a database service later
  # postgres:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: vois
  #     POSTGRES_USER: vois_user
  #     POSTGRES_PASSWORD: vois_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

  # Example of how to add Redis for caching/search later
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data: